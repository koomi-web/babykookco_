            --color-brown-dark: #5c3a21;

        body {

            background-position: 0 0, 12px 12px;
            color: var(--color-brown-dark);
            scroll-behavior: smooth;
        }

        .font-slackey {

        }

        .text-shadow-cute {
            text-shadow: 2px 2px 0px #fff, 3px 3px 0px var(--color-pink-light);
        }

        .clean-box {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            box-shadow: 0 10px 40px rgba(255, 133, 179, 0.15);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--color-pink-bg); }
        ::-webkit-scrollbar-thumb { background: var(--color-pink-dark); border-radius: 10px; }

        .slider-track {
            display: flex;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .slide {
            min-width: 100%;
        }
    </style>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('side-menu');
            const overlay = document.getElementById('menu-overlay');
            if (menu.classList.contains('-translate-x-full')) {
                menu.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.remove('opacity-0'), 10);
            } else {
                menu.classList.add('-translate-x-full');
                overlay.classList.add('opacity-0');
                setTimeout(() => overlay.classList.add('hidden'), 300);
            }
        }

        let currentSlide = 0;
        const track = document.getElementById('slider-track');
        const slides = document.querySelectorAll('.slide');
        const totalSlides = slides.length;

        function nextSlide() {
            currentSlide = (currentSlide + 1) % totalSlides;
            track.style.transform = `translateX(-${currentSlide * 100}%)`;
        }

        setInterval(nextSlide, 4000);
    </script>
